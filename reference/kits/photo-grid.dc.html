<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  .pg-ctl{opacity:0;transition:opacity .14s ease}
  .pg-card:hover .pg-ctl{opacity:1}
  .pg-card.dragging{opacity:.45;transform:scale(.97);z-index:20}
  .pg-card{transition:transform .16s ease,opacity .16s ease}
  .pg-grip{cursor:grab}
  .pg-grip:active{cursor:grabbing}
</style>
<script src="./media-slot.js"></script>
</helmet>

<div>
  <div ref="{{ gridRef }}" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-auto-rows:158px;gap:16px;grid-auto-flow:dense">
    <sc-for list="{{ cards }}" as="c" hint-placeholder-count="5">
      <div class="pg-card {{ c.dragCls }}" data-card style="{{ c.style }}">
        <div class="pg-ctl" style="position:absolute;top:8px;left:8px;z-index:6;display:flex;gap:5px">
          <button onPointerdown="{{ c.onDragDown }}" class="pg-grip" title="Drag to rearrange" style="width:30px;height:30px;border:0;border-radius:8px;background:rgba(20,16,12,.72);color:#fff;display:inline-flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);touch-action:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>
          </button>
          <button onClick="{{ c.onResize }}" title="Resize" style="width:30px;height:30px;border:0;border-radius:8px;background:rgba(20,16,12,.72);color:#fff;display:inline-flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:pointer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
          </button>
          <button onClick="{{ c.onDelete }}" title="Delete card" style="width:30px;height:30px;border:0;border-radius:8px;background:rgba(20,16,12,.72);color:#fff;display:inline-flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:pointer;font-size:14px">✕</button>
        </div>
        <media-slot id="{{ c.slotId }}" no-resize shape="rect" style="width:100%;height:100%;display:block" placeholder="Drop a photo or video"></media-slot>
      </div>
    </sc-for>
    <button onClick="{{ onAdd }}" style="grid-column:span 1;border:2px dashed var(--border,#EADFD2);background:var(--surface-2,#F4EADC);border-radius:var(--img-radius,16px);color:var(--muted,#8A7B6B);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;min-height:0" style-hover="border-color:var(--accent,#E0603A);color:var(--accent,#E0603A)">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Add photo
    </button>
  </div>
  <div style="margin-top:16px;display:flex;align-items:center;gap:8px;font-family:'Manrope',sans-serif;font-size:13px;color:var(--muted,#8A7B6B)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    Drag the grip to rearrange, tap the arrows to resize, or click a photo to edit it with AI. The layout always stays tidy.
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 940, &quot;height&quot;: 540 },
  &quot;gridId&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;gallery&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  SIZES = { sm: { c: 1, r: 1 }, wide: { c: 2, r: 1 }, tall: { c: 1, r: 2 }, big: { c: 2, r: 2 } };
  ORDER = ['sm', 'wide', 'tall', 'big'];
  COLS = 4;

  constructor(props) {
    super(props);
    const gid = (props && props.gridId) || 'gallery';
    let cards = [
      { k: 1, size: 'big' }, { k: 2, size: 'sm' }, { k: 3, size: 'sm' },
      { k: 4, size: 'wide' }, { k: 5, size: 'sm' }
    ];
    let next = 6;
    try {
      const raw = localStorage.getItem('halo-photogrid-' + gid);
      if (raw) {
        const saved = JSON.parse(raw);
        if (Array.isArray(saved) && saved.length) {
          cards = saved.map((c) => ({ k: c.k, size: this.SIZES[c.size] ? c.size : 'sm' }));
          next = Math.max.apply(null, cards.map((c) => c.k)) + 1;
        }
      }
    } catch (e) {}
    this.state = { cards, dragK: null };
    this._next = next;
    this._gid = gid;
  }

  save() {
    try {
      localStorage.setItem('halo-photogrid-' + this._gid,
        JSON.stringify(this.state.cards.map((c) => ({ k: c.k, size: c.size }))));
    } catch (e) {}
  }

  cycle(k) {
    this.setState((s) => ({
      cards: s.cards.map((c) => c.k === k ? { ...c, size: this.ORDER[(this.ORDER.indexOf(c.size) + 1) % this.ORDER.length] } : c)
    }), () => this.save());
  }

  del(k) {
    this.setState((s) => ({ cards: s.cards.filter((c) => c.k !== k) }), () => this.save());
  }

  add() {
    const k = this._next++;
    this.setState((s) => ({ cards: s.cards.concat([{ k, size: 'sm' }]) }), () => this.save());
  }

  startDrag(k, e) {
    if (e.button != null && e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    this.setState({ dragK: k });
    const move = (ev) => {
      if (!this.grid) return;
      const els = Array.prototype.slice.call(this.grid.querySelectorAll('.pg-card'));
      let tgt = -1;
      els.forEach((el, idx) => {
        const r = el.getBoundingClientRect();
        if (ev.clientX >= r.left && ev.clientX <= r.right && ev.clientY >= r.top && ev.clientY <= r.bottom) tgt = idx;
      });
      if (tgt < 0) return;
      this.setState((s) => {
        const from = s.cards.findIndex((c) => c.k === k);
        if (from < 0 || tgt === from) return null;
        const arr = s.cards.slice();
        const m = arr.splice(from, 1)[0];
        arr.splice(tgt, 0, m);
        return { cards: arr };
      });
    };
    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      this.setState({ dragK: null }, () => this.save());
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  }

  renderVals() {
    const gid = this._gid;
    const cards = this.state.cards.map((c) => {
      const sz = this.SIZES[c.size] || this.SIZES.sm;
      const cs = Math.min(this.COLS, sz.c);
      return {
        k: c.k,
        slotId: gid + '-' + c.k,
        dragCls: this.state.dragK === c.k ? 'dragging' : '',
        style: {
          position: 'relative',
          gridColumn: 'span ' + cs,
          gridRow: 'span ' + sz.r,
          borderRadius: 'var(--img-radius,16px)',
          overflow: 'hidden',
          background: 'var(--surface-2,#F4EADC)',
          boxShadow: 'var(--img-shadow,0 14px 38px rgba(90,55,30,.10))',
          border: 'var(--img-border,none)',
          minHeight: 0
        },
        onResize: () => this.cycle(c.k),
        onDelete: () => this.del(c.k),
        onDragDown: (e) => this.startDrag(c.k, e)
      };
    });
    return { gridRef: (el) => { this.grid = el; }, cards, onAdd: () => this.add() };
  }
}
</script>
</body>
</html>
